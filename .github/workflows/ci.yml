name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Parity, build & performance budget
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # I18N-02 + D-03 gate: DE/EN parity (blocklist skips in CI — file is local-only)
      - name: Content parity check
        run: pnpm check:content

      - name: Build
        run: pnpm build

      # TECH-07 performance budget: LCP <= 2500ms, script bytes <= 153600, perf >= 0.9
      - name: Lighthouse CI budget
        run: npx lhci autorun

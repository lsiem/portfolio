name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Parity, build & performance budget
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # I18N-02 + D-03 gate: DE/EN parity (blocklist skips in CI — file is local-only)
      - name: Content parity check
        run: pnpm check:content

      - name: Build
        run: pnpm build

      # TECH-01/TECH-07 performance budget (lighthouserc.json) against a LOCAL
      # production build (`pnpm start`, wired via startServerCommand): LCP <=
      # 2500ms (warn — see below), total-blocking-time <= 200ms (INP proxy),
      # cumulative-layout-shift <= 0.1, script bytes <= 184643, perf >= 0.9.
      #
      # Why local, not the deployed URL (04-02 investigation, phase3-perf-bundle-gap
      # RESOLUTION): the app `/_next` chunk set is byte-identical localhost ==
      # deployed (~177KB both), so a local production audit measures the TRUE
      # shipped app payload and a real app-JS regression still fails the gate.
      # Auditing the deployed preview instead is actively WORSE in CI: GitHub
      # Actions' headless/datacenter Chrome reliably triggers Vercel's platform
      # bot-mitigation challenge (~96KB high-priority script, absent for real
      # users), which corrupts script:size AND the main-thread metrics
      # (TBT/LCP/perf) with non-app bytes. The debug finding's original premise
      # (localhost hides ~100KB of app JS) was disproven — the deployed number
      # was inflated by non-app platform injection, not hidden app code.
      - name: Lighthouse CI budget
        run: npx lhci autorun
